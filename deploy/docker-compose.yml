services:
  postgre:
    image: postgres:16-alpine
    container_name: postgre
    networks: [app-net]  
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data

  init-migrations:
    image: migrate/migrate:v4.18.2
    container_name: init-migrations
    networks: [app-net]
    depends_on:
      postgre:
        condition: service_healthy
    restart: no
    volumes:
      - ../migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable","up"]

  scrapper:
    image: ghcr.io/n1jke/linktrackereng-scrapper:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.scrapper
    container_name: scrapper
    networks: [app-net]  
    env_file:
      - .env
    ports:
      - "${SCRAPPER_PORT}:8080"
    depends_on:
      postgre:
        condition: service_healthy
      init-migrations:                  
        condition: service_completed_successfully
      sentinel:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
      init-schema:                      
        condition: service_completed_successfully
    command: ["./bin/scrapper"]

  bot:
    image: ghcr.io/n1jke/linktrackereng-bot:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    container_name: bot
    networks: [app-net]  
    env_file:
      - .env
    ports:
      - "${BOT_PORT}:8081"
    depends_on:
      scrapper:
        condition: service_started
    command: ["./bin/bot"]

  agent:
    image: ghcr.io/n1jke/linktrackereng-agent:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: agent
    networks: [app-net]  
    env_file:
      - .env
    ports:
      - "${AGENT_PORT}:8070"
    depends_on:
      scrapper:
        condition: service_started

  valkey-1:
    image: valkey/valkey:9.0.3
    container_name: valkey-1
    hostname: valkey-1
    networks: [app-net]  
    ports:
      - "${VALKEY_1_PORT}:6379"
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    healthcheck:
      test: ["CMD", "valkey-cli", "--user", "${VALKEY_USERNAME}", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./valkey.conf:/etc/valkey/valkey.conf:ro
      - ./users.acl:/etc/valkey/users.acl:ro
      - valkey_1_data:/data

  valkey-2:
    image: valkey/valkey:9.0.3
    container_name: valkey-2
    hostname: valkey-2
    networks: [app-net]  
    ports:
      - "${VALKEY_2_PORT}:6379"
    command: >
      valkey-server /etc/valkey/valkey.conf 
      --replicaof valkey-1 6379 
      --masteruser ${VALKEY_USERNAME} 
      --masterauth ${VALKEY_PASSWORD}
    healthcheck:
      test: ["CMD", "valkey-cli", "--user", "${VALKEY_USERNAME}", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./valkey.conf:/etc/valkey/valkey.conf:ro
      - ./users.acl:/etc/valkey/users.acl:ro
      - valkey_2_data:/data

  valkey-3: 
    image: valkey/valkey:9.0.3
    container_name: valkey-3
    hostname: valkey-3
    networks: [app-net]  
    ports:
      - "${VALKEY_3_PORT}:6379"
    command: >
      valkey-server /etc/valkey/valkey.conf 
      --replicaof valkey-1 6379 
      --masteruser ${VALKEY_USERNAME} 
      --masterauth ${VALKEY_PASSWORD}
    healthcheck:
      test: ["CMD", "valkey-cli", "--user", "${VALKEY_USERNAME}", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      valkey-1:
        condition: service_healthy
    volumes:
      - ./valkey.conf:/etc/valkey/valkey.conf:ro
      - ./users.acl:/etc/valkey/users.acl:ro
      - valkey_3_data:/data

  sentinel:
    image: valkey/valkey:9.0.3
    container_name: sentinel
    hostname: sentinel
    networks: [app-net]  
    ports:
      - "${VALKEY_SENTINEL_PORT}:26379"
    command: ["valkey-sentinel", "/etc/sentinel/sentinel.conf"]
    depends_on:
      valkey-1:
        condition: service_healthy
      valkey-2:
        condition: service_healthy
      valkey-3:
        condition: service_healthy
    volumes:
      - ./sentinel.conf:/etc/sentinel/sentinel.conf
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kafka-1:
    image: apache/kafka:4.0.2
    container_name: kafka-1
    hostname: kafka-1
    networks: [app-net]  
    ports:
      - "${KAFKA_1_PORT}:19092"
    environment:
      # Cluster
      CLUSTER_ID: "10a5cca0-8a3c-4626-b3ad-ad8f2f5326f8"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"

      # Node 
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      # Listeners 
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:9092,EXTERNAL://kafka-1:19092"

      KAFKA_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: "PLAIN"
      KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USER}" password="${KAFKA_PASSWORD}"
        user_${KAFKA_USER}="${KAFKA_PASSWORD}";

      # Fault tolerance
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: false
    healthcheck:
      test: ["CMD-SHELL", '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - kafka_1_data:/var/lib/kafka/data

  kafka-2:
    image: apache/kafka:4.0.2
    container_name: kafka-2
    hostname: kafka-2
    networks: [app-net]  
    ports:
      - "${KAFKA_2_PORT}:19092"
    environment:
      # Cluster
      CLUSTER_ID: "10a5cca0-8a3c-4626-b3ad-ad8f2f5326f8"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"

      # Node 
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"

      # Listeners 
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:9092,EXTERNAL://kafka-2:19092"

      KAFKA_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: "PLAIN"
      KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USER}" password="${KAFKA_PASSWORD}"
        user_${KAFKA_USER}="${KAFKA_PASSWORD}";

      # Fault tolerance
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: false
    healthcheck:
      test: ["CMD-SHELL", '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - kafka_2_data:/var/lib/kafka/data

  kafka-3:
    image: apache/kafka:4.0.2
    container_name: kafka-3
    hostname: kafka-3
    networks: [app-net]  
    ports:
      - "${KAFKA_3_PORT}:19092"
    environment:
      # Cluster
      CLUSTER_ID: "10a5cca0-8a3c-4626-b3ad-ad8f2f5326f8"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"

      # Node 
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"

      # Listener
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-3:9092,EXTERNAL://kafka-3:19092"

      KAFKA_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: "PLAIN"
      KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS: "PLAIN"
      KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USER}" password="${KAFKA_PASSWORD}"
        user_${KAFKA_USER}="${KAFKA_PASSWORD}";

      # Fault tolerance
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: false
    healthcheck:
      test: ["CMD-SHELL", '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - kafka_3_data:/var/lib/kafka/data

  init-kafka:
    image: apache/kafka:4.0.2
    container_name: init-kafka
    networks: [app-net]  
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_INTERNAL}
      KAFKA_RAW_UPDATES_TOPIC: ${KAFKA_RAW_UPDATES_TOPIC}
      KAFKA_RAW_DLQ_TOPIC: ${KAFKA_RAW_DLQ_TOPIC}
      KAFKA_PREP_UPDATES_TOPIC: ${KAFKA_PREP_UPDATES_TOPIC}
      KAFKA_PREP_DLQ_TOPIC: ${KAFKA_PREP_DLQ_TOPIC}
    restart: no
    volumes:
      - ./scripts/init-kafka.sh:/opt/init-kafka.sh:ro
    entrypoint: ["/bin/bash", "/opt/init-kafka.sh"]

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    networks: [app-net]  
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS_INTERNAL}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

  init-schema:
    image: curlimages/curl:8.13.0
    container_name: init-schema
    networks: [app-net]
    depends_on:
      schema-registry:
        condition: service_healthy
    restart: no
    environment:
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL}
      KAFKA_RAW_UPDATES_TOPIC: ${KAFKA_RAW_UPDATES_TOPIC}
      KAFKA_RAW_DLQ_TOPIC: ${KAFKA_RAW_DLQ_TOPIC}
      KAFKA_PREP_UPDATES_TOPIC: ${KAFKA_PREP_UPDATES_TOPIC}
      KAFKA_PREP_DLQ_TOPIC: ${KAFKA_PREP_DLQ_TOPIC}
    volumes:
      - ./schema:/schema:ro
      - ./scripts/init-schema.sh:/init-schema.sh:ro
    entrypoint: ["/bin/sh", "/init-schema.sh"]

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    container_name: schema-registry
    networks: [app-net]  
    depends_on:
      kafka-1:
        condition: service_healthy  
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_INTERNAL}
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: "schemas"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    networks: [app-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      scrapper:
        condition: service_started
      bot:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  pushgateway:
    image: prom/pushgateway:v1.11.3
    container_name: pushgateway
    networks: [app-net]
    ports:
      - "9091:9091"
    command:
      - "--push.disable-consistency-check"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: grafana
    networks: [app-net]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  valkey_1_data:
  valkey_2_data:
  valkey_3_data:
  prometheus_data:   
  grafana_data:      

networks:
  app-net:
    driver: bridge
